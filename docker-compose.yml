services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_USER=test_user
      - POSTGRES_DB=test_db
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: mao-server
    environment:
      - DATABASE_URL=postgres://test_user:test_password@db:5432/test_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=d3699b6a467b1d32e1da53885d407e718f637fe076782af0efe3b7d5b111c123
      - JWT_EXPIRES_IN=5h
    depends_on:
      db:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true

  load_balancer:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server